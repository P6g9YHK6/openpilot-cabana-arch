name: AUR Commit Automation

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  UPSTREAM_REPO: https://github.com/deanlee/openpilot-cabana.git

permissions:
  contents: write

jobs:
  aur-publish:
    if: github.repository == 'P6g9YHK6/openpilot-cabana-arch'
    runs-on: ubuntu-latest
    container:
      image: archlinux/archlinux:base-devel
      options: --user root

    steps:
      - name: Install runtime tools
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git openssh sudo ca-certificates

      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.SYNC_PAT || github.token }}

      - name: Mark repository as safe for git
        run: |
          git config --global --add safe.directory '*'

      - name: Add upstream and check for new commits
        run: |
          git remote add upstream $UPSTREAM_REPO
          git fetch upstream --tags || true
          UPSTREAM_HEAD=$(git rev-parse upstream/main 2>/dev/null || \
                          git rev-parse FETCH_HEAD 2>/dev/null)
          if [ -z "$UPSTREAM_HEAD" ]; then
            echo "Fetch failed — cannot check upstream"
            echo "BEHIND=0" >> $GITHUB_ENV
            exit 0
          fi
          BEHIND=$(git rev-list HEAD..$UPSTREAM_HEAD --count 2>/dev/null || echo "0")
          echo "Upstream is $BEHIND commits ahead"
          echo "BEHIND=$BEHIND" >> $GITHUB_ENV

      - name: Sync fork with upstream
        if: env.BEHIND != '0'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git merge upstream/main --no-commit --no-edit 2>&1 || true
          # For Arch-patched files: keep fork's version if conflicted
          for f in SConstruct src/SConscript; do
            if git diff --name-only --diff-filter=U | grep -qxF "$f"; then
              git checkout --ours -- "$f" && git add "$f"
            fi
          done
          # For any remaining conflicts, accept upstream
          if git diff --name-only --diff-filter=U | grep -q .; then
            git checkout --theirs -- $(git diff --name-only --diff-filter=U)
            git add -A
          fi
          git commit -m "Merge upstream/main" || echo "Nothing to commit"
          git submodule update --init --recursive
          git push 'https://x-access-token:${{ secrets.SYNC_PAT }}@github.com/${{ github.repository }}.git' main

      - name: Get version from upstream
        run: |
          PKGVER=$(git describe --tags upstream/main | sed 's/^v//; s/-/./g')
          COMMIT=$(git rev-parse upstream/main)
          echo "PKGVER=$PKGVER" >> $GITHUB_ENV
          echo "COMMIT=$COMMIT" >> $GITHUB_ENV
          echo "Release: $PKGVER at $COMMIT"

      - name: Generate archlinux.patch
        run: |
          git diff upstream/main -- SConstruct src/SConscript > archlinux.patch || true
          echo "Patch size: $(wc -l < archlinux.patch) lines"

      - name: Setup SSH for AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          {
            echo "Host aur.archlinux.org"
            echo "  StrictHostKeyChecking accept-new"
            echo "  IdentityFile ~/.ssh/id_ed25519"
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config
          ssh-keyscan -t rsa,ed25519 aur.archlinux.org >> ~/.ssh/known_hosts 2>&1 || true

      - name: Create builder user for makepkg
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

      - name: Build and push PKGBUILD to AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          if [ -z "$PKGVER" ] || [ -z "$COMMIT" ]; then
            echo "Missing PKGVER or COMMIT"
            exit 1
          fi

          git clone aur@aur.archlinux.org:openpilot-cabana.git /tmp/aur-pkg
          cd /tmp/aur-pkg

          CURRENT_VER=$(grep -oP '^pkgver=\K.*' PKGBUILD 2>/dev/null || echo "")
          if [ "$CURRENT_VER" = "$PKGVER" ]; then
            echo "Version $PKGVER already current in AUR — nothing to do"
            exit 0
          fi

          # Copy assets
          cp /github/workspace/archlinux.patch .
          cp /github/workspace/cabana.desktop .
          cp /github/workspace/cabana-icon.svg .

          cat > PKGBUILD << 'PKGEOF'
          # Maintainer: P6g9YHK6 <https://github.com/P6g9YHK6>
          pkgname=openpilot-cabana
          _pkgname=openpilot-cabana
          pkgver=__PKGVER__
          pkgrel=1
          epoch=1
          pkgdesc="CAN Bus Visualizer & Analyzer - Qt-based graphical tool for viewing, analyzing, and reverse-engineering raw CAN bus data"
          arch=('x86_64')
          url="https://github.com/deanlee/openpilot-cabana"
          license=('MIT')
          depends=(
            'capnproto'
            'zeromq'
            'curl'
            'openssl'
            'bzip2'
            'ffmpeg'
            'libxkbcommon'
            'libxcb'
            'libx11'
            'libglvnd'
            'ocl-icd'
            'qt6-base'
            'qt6-svg'
            'qt6-tools'
            'qt6-charts'
            'qt6-serialbus'
            'libusb'
            'zstd'
            'python'
            'python-numpy'
          )
          makedepends=('python-pip' 'git' 'cython' 'scons' 'clang')
          provides=('cabana')
          conflicts=('openpilot-cabana-git')
          options=(!lto)

          source=("git+https://github.com/deanlee/openpilot-cabana.git#commit=__COMMIT__"
                  "archlinux.patch"
                  "cabana.desktop"
                  "cabana-icon.svg")
          sha256sums=('SKIP' 'SKIP' 'SKIP' 'SKIP')

          prepare() {
            cd "$_pkgname"
            git submodule update --init --recursive
            patch -p1 -i "$srcdir/archlinux.patch"
          }

          build() {
            cd "$_pkgname"
            python -m venv build_venv
            source build_venv/bin/activate
            pip install scons numpy cython setuptools pycapnp
            scons --cache-disable
          }

          package() {
            cd "$_pkgname"
            install -Dm755 cabana "$pkgdir/usr/bin/cabana"
            install -dm755 "$pkgdir/usr/share/cabana"
            cp -r data assets "$pkgdir/usr/share/cabana/"
            install -Dm644 LICENSE "$pkgdir/usr/share/licenses/$pkgname/LICENSE"
            install -Dm644 ../../cabana.desktop "$pkgdir/usr/share/applications/cabana.desktop"
            install -Dm644 ../../cabana-icon.svg "$pkgdir/usr/share/icons/hicolor/scalable/apps/cabana.svg"
          }
          PKGEOF

          sed -i "s/__PKGVER__/$PKGVER/g" PKGBUILD
          sed -i "s|__COMMIT__|$COMMIT|g" PKGBUILD

          chown -R builder:builder /tmp/aur-pkg
          sudo -u builder makepkg --printsrcinfo > .SRCINFO

          git add -A
          git commit -m "Auto-update: $PKGVER ($COMMIT)" || echo "No changes"
          git push
